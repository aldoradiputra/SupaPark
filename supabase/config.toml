# Minimal Supabase CLI config for local development.
# Regenerate a full file any time with `supabase init` (it will not touch
# the migrations/ or seed.sql you already have).
project_id = "supapark"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Disabled so the seeded demo admin can sign in immediately on local.
enable_confirmations = false

# Edge functions are machine-to-machine (lane X-API-Key / webhook signature),
# so the Supabase JWT gate is disabled — each function authorizes itself.
[functions.session-entry]
verify_jwt = false

[functions.session-exit]
verify_jwt = false

[functions.session-sync]
verify_jwt = false

[functions.qris-webhook]
verify_jwt = false

[functions.lane-heartbeat]
verify_jwt = false
