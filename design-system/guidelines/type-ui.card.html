<!-- @dsCard group="Type" viewport="700x180" name="Plus Jakarta Sans — UI" subtitle="All titles, buttons, body. Modern, Indonesian roots." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-base);font-family:var(--font-ui);color:var(--text-primary);}
  .wrap{padding:24px;}
  .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-tertiary);margin-bottom:8px;}
  .big{font-size:40px;font-weight:800;letter-spacing:-.02em;}
  .spec{font-size:18px;color:var(--text-secondary);margin-top:6px;}
  .w{display:flex;gap:22px;margin-top:14px;}
  .w span{font-size:15px;}
</style></head>
<body>
<div class="wrap">
  <div class="lbl">Primary — UI Font</div>
  <div class="big">Plus Jakarta Sans</div>
  <div class="spec">Aa Bb Cc Dd 0123456789 — Pendapatan Hari Ini</div>
  <div class="w">
    <span style="font-weight:400;">Regular 400</span>
    <span style="font-weight:500;">Medium 500</span>
    <span style="font-weight:600;">Semibold 600</span>
    <span style="font-weight:700;">Bold 700</span>
    <span style="font-weight:800;">Extrabold 800</span>
  </div>
</div>
</body></html>
