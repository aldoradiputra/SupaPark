<!-- @dsCard group="Type" viewport="700x300" name="Dashboard type scale" subtitle="11px labels → 28px metrics" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-base);font-family:var(--font-ui);color:var(--text-primary);}
  .wrap{padding:20px 24px;}
  .row{display:flex;align-items:baseline;gap:20px;padding:9px 0;border-bottom:.5px solid var(--border-faint);}
  .k{font-size:11px;color:var(--text-tertiary);width:110px;flex-shrink:0;font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
  .v{color:var(--text-primary);}
  .m{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);margin-left:auto;flex-shrink:0;}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="k">Metric</span><span class="v" style="font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;">Rp 2,4jt</span><span class="m">28 / 700</span></div>
  <div class="row"><span class="k">Page Title</span><span class="v" style="font-size:24px;font-weight:600;">Revenue Overview</span><span class="m">24 / 600</span></div>
  <div class="row"><span class="k">Card Title</span><span class="v" style="font-size:16px;font-weight:600;">Today's Revenue</span><span class="m">16 / 600</span></div>
  <div class="row"><span class="k">Body</span><span class="v" style="font-size:14px;font-weight:400;color:var(--text-secondary);">3 vehicles in lane</span><span class="m">14 / 400</span></div>
  <div class="row"><span class="k">Section</span><span class="v" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary);">ACTIVE SESSIONS</span><span class="m">11 / 600</span></div>
</div>
</body></html>
