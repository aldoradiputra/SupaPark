<!-- @dsCard group="Brand" viewport="700x220" name="Logo lockup" subtitle="Barrier-gate P + wordmark. Amber on dark, white on booth." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-base);font-family:var(--font-ui);color:var(--text-primary);}
  .wrap{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .panel{border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;gap:14px;height:84px;}
  .lock{display:flex;align-items:center;gap:12px;}
  .wm{font-weight:700;letter-spacing:.15em;font-size:26px;}
  .cap{grid-column:1/-1;font-size:11px;color:var(--text-tertiary);}
</style></head>
<body>
<div class="wrap">
  <div class="panel">
    <span class="lock">
      <svg width="40" height="40" viewBox="0 0 48 48" fill="none"><rect x="10" y="8" width="10" height="32" rx="3" fill="#F5A623"/><path d="M20 8h10a10 10 0 0 1 0 20H20" stroke="#F5A623" stroke-width="8" stroke-linecap="round" fill="none"/></svg>
      <span class="wm" style="color:#F5F5F0">SUPAPARK</span>
    </span>
  </div>
  <div class="panel" style="background:#000;border-color:#333;">
    <span class="lock">
      <svg width="40" height="40" viewBox="0 0 48 48" fill="none"><rect x="10" y="8" width="10" height="32" rx="3" fill="#FFFFFF"/><path d="M20 8h10a10 10 0 0 1 0 20H20" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none"/></svg>
      <span class="wm" style="color:#fff">SUPAPARK</span>
    </span>
  </div>
  <div class="cap">The vertical stroke is the gate post; the curve is the barrier arm raised. Min size 24px. 8px gap, vertically centered.</div>
</div>
</body></html>
