<!-- @dsCard group="Type" viewport="700x180" name="JetBrains Mono — Data" subtitle="Plates, money, IDs, timestamps. Always amber." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-base);font-family:var(--font-ui);color:var(--text-primary);}
  .wrap{padding:24px;}
  .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text-tertiary);margin-bottom:8px;}
  .big{font-family:var(--font-mono);font-size:40px;font-weight:700;color:var(--amber);letter-spacing:.06em;}
  .spec{font-family:var(--font-mono);font-size:18px;color:var(--text-secondary);margin-top:10px;letter-spacing:.08em;}
  .row{display:flex;gap:22px;margin-top:12px;align-items:baseline;}
  .plate{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--amber);letter-spacing:.1em;}
</style></head>
<body>
<div class="wrap">
  <div class="lbl">Secondary — Data Font</div>
  <div class="big">JetBrains Mono</div>
  <div class="row">
    <span class="plate">B 1234 ABC</span>
    <span class="plate">D 5678 XY</span>
    <span class="plate" style="color:var(--text-primary)">Rp 5.000</span>
  </div>
  <div class="spec">0123456789 · 14:32 WIB · 1j 47m</div>
</div>
</body></html>
