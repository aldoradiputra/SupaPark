<!-- @dsCard group="Spacing" viewport="700x160" name="Radius — 12px ceiling" subtitle="Never rounder than 12px on a container." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-base);font-family:var(--font-ui);color:var(--text-primary);}
  .wrap{padding:24px;display:flex;gap:24px;align-items:flex-end;}
  .item{text-align:center;}
  .box{width:84px;height:64px;background:var(--surface-elevated);border:1px solid var(--border);}
  .n{font-size:12px;font-weight:600;margin-top:10px;}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:6px;"></div><div class="n">sm</div><div class="h">6px · badges</div></div>
  <div class="item"><div class="box" style="border-radius:8px;"></div><div class="n">default</div><div class="h">8px · buttons</div></div>
  <div class="item"><div class="box" style="border-radius:12px;"></div><div class="n">lg</div><div class="h">12px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:999px;width:64px;"></div><div class="n">pill</div><div class="h">999px · status</div></div>
</div>
</body></html>
