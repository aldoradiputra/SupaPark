<!-- @dsCard group="Colors" viewport="700x150" name="Dark Foundation" subtitle="Dashboard surfaces — elevation by color step, not shadow." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-base);font-family:var(--font-ui);color:var(--text-primary);}
  .wrap{padding:20px;display:flex;gap:12px;}
  .sw{flex:1;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
  .chip{height:64px;}
  .meta{padding:8px 10px;}
  .n{font-size:12px;font-weight:600;}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:1px;}
  .d{font-size:10px;color:var(--text-tertiary);margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#0A0A0A"></div><div class="meta"><div class="n">Base</div><div class="h">#0A0A0A</div><div class="d">Background</div></div></div>
  <div class="sw"><div class="chip" style="background:#111111"></div><div class="meta"><div class="n">Raised</div><div class="h">#111111</div><div class="d">Cards</div></div></div>
  <div class="sw"><div class="chip" style="background:#1A1A1A"></div><div class="meta"><div class="n">Overlay</div><div class="h">#1A1A1A</div><div class="d">Modals</div></div></div>
  <div class="sw"><div class="chip" style="background:#222222"></div><div class="meta"><div class="n">Elevated</div><div class="h">#222222</div><div class="d">Hover</div></div></div>
  <div class="sw"><div class="chip" style="background:#2A2A2A"></div><div class="meta"><div class="n">Border</div><div class="h">#2A2A2A</div><div class="d">Hairline</div></div></div>
</div>
</body></html>
