<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-base);font-family:var(--font-ui);color:var(--text-primary);}
  .wrap{padding:20px;display:flex;gap:12px;}
  .sw{flex:1;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
  .chip{height:64px;}
  .meta{padding:8px 10px;}
  .n{font-size:12px;font-weight:600;}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:1px;}
  .d{font-size:10px;color:var(--text-tertiary);margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#F5A623"></div><div class="meta"><div class="n">Amber</div><div class="h">#F5A623</div><div class="d">Primary CTA</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFB830"></div><div class="meta"><div class="n">Bright</div><div class="h">#FFB830</div><div class="d">Hover</div></div></div>
  <div class="sw"><div class="chip" style="background:#B57A18"></div><div class="meta"><div class="n">Dim</div><div class="h">#B57A18</div><div class="d">Pressed</div></div></div>
  <div class="sw"><div class="chip" style="background:#2A1F08"></div><div class="meta"><div class="n">Subtle</div><div class="h">#2A1F08</div><div class="d">Tinted fill</div></div></div>
</div>
</body></html>
