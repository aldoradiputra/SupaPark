<!-- @dsCard group="Colors" viewport="700x150" name="Status — earned, not decorative" subtitle="Green = done · Red = error · Blue = info" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--surface-base);font-family:var(--font-ui);color:var(--text-primary);}
  .wrap{padding:20px;display:flex;gap:12px;}
  .sw{flex:1;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
  .chip{height:64px;}
  .meta{padding:8px 10px;}
  .n{font-size:12px;font-weight:600;}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:1px;}
  .d{font-size:10px;color:var(--text-tertiary);margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#22C55E"></div><div class="meta"><div class="n">Success</div><div class="h">#22C55E</div><div class="d">Paid · valid</div></div></div>
  <div class="sw"><div class="chip" style="background:#EF4444"></div><div class="meta"><div class="n">Error</div><div class="h">#EF4444</div><div class="d">Stuck · failed</div></div></div>
  <div class="sw"><div class="chip" style="background:#3B82F6"></div><div class="meta"><div class="n">Info</div><div class="h">#3B82F6</div><div class="d">Links · neutral</div></div></div>
</div>
</body></html>
