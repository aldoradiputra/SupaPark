<!-- @dsCard group="Colors" viewport="700x150" name="Booth — ultra contrast" subtitle="Pure black kiosk world. Neon confirm, bright error." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:#000;font-family:var(--font-ui);color:#fff;}
  .wrap{padding:20px;display:flex;gap:12px;}
  .sw{flex:1;border-radius:var(--radius);overflow:hidden;border:1px solid #333;}
  .chip{height:64px;}
  .meta{padding:8px 10px;}
  .n{font-size:12px;font-weight:600;}
  .h{font-family:var(--font-mono);font-size:11px;color:#999;margin-top:1px;}
  .d{font-size:10px;color:#777;margin-top:2px;}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#000;border-bottom:1px solid #333"></div><div class="meta"><div class="n">BG</div><div class="h">#000000</div><div class="d">Pure black</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="n">Text</div><div class="h">#FFFFFF</div><div class="d">Pure white</div></div></div>
  <div class="sw"><div class="chip" style="background:#999999"></div><div class="meta"><div class="n">Secondary</div><div class="h">#999999</div><div class="d">Sub copy</div></div></div>
  <div class="sw"><div class="chip" style="background:#00FF88"></div><div class="meta"><div class="n">Neon Green</div><div class="h">#00FF88</div><div class="d">Confirm</div></div></div>
  <div class="sw"><div class="chip" style="background:#FF3333"></div><div class="meta"><div class="n">Bright Red</div><div class="h">#FF3333</div><div class="d">Error</div></div></div>
</div>
</body></html>
