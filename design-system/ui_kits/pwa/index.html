<!-- @dsCard group="PWA" viewport="700x900" name="Parking PWA" subtitle="Visitor mobile app · link plate, prepay, history · 5 screens · 375px" -->
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SupaPark — Parkir</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: #070707; }
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  .pwa-scroll::-webkit-scrollbar { width: 0; }
  input:focus, button:focus { outline: none; }
  input::placeholder { color: #5c5c54; opacity: 1; letter-spacing: normal; }
  @keyframes pwaPulse { 0%, 100% { opacity: .4; } 50% { opacity: 1; } }
  @keyframes pwaPop { 0% { transform: scale(.7); } 60% { transform: scale(1.06); } 100% { transform: scale(1); } }
  @media (prefers-reduced-motion: reduce) { [style*="pwaPulse"], [style*="pwaPop"] { animation: none !important; } }
</style>
</head>
<body>
<div id="root" data-screen-label="Parking PWA"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>

<script type="text/babel" src="pwa.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  function mount(){ if (window.PWA_App) root.render(<window.PWA_App/>); else setTimeout(mount, 40); }
  mount();
</script>
</body>
</html>
