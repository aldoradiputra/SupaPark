<!-- @startingPoint section="Dashboard" subtitle="Full operator dashboard — shell, overview, leads, projects, details, mobile" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SupaPark — Operator Dashboard</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--surface-base); }
  * { -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 6px; border: 2px solid var(--surface-base); }
  ::-webkit-scrollbar-track { background: transparent; }
  textarea:focus, input:focus, select:focus { outline: none; border-color: var(--amber) !important; }
  @keyframes spPing { 0% { transform: scale(.5); opacity: .7; } 100% { transform: scale(2.6); opacity: 0; } }

  /* responsive grid collapse (desktop narrow widths) */
  @media (max-width: 1100px) {
    .sp-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
    .sp-grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
    .sp-grid-2 { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 640px) {
    .sp-grid-4 { grid-template-columns: 1fr 1fr !important; }
    .sp-grid-3 { grid-template-columns: 1fr !important; }
  }
  /* mobile frame: force compact layouts regardless of frame width */
  .sp-mobile .sp-grid-2, .sp-mobile .sp-grid-3 { grid-template-columns: 1fr !important; }
  .sp-mobile .sp-grid-4 { grid-template-columns: 1fr 1fr !important; }
</style>
</head>
<body>
<div id="root" data-screen-label="Operator Dashboard"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>

<script src="data.js"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Overview.jsx"></script>
<script type="text/babel" src="Leads.jsx"></script>
<script type="text/babel" src="Projects.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  function mount(){
    if (window.SP_App && window.SPUI && window.SP_Overview && window.SupaParkDesignSystem_80b640) {
      root.render(<window.SP_App/>);
    } else { setTimeout(mount, 40); }
  }
  mount();
</script>
</body>
</html>
