<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SupaPark — Booth</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 24px;
        background: #000; color: #fff; font-family: system-ui, sans-serif;
        text-align: center;
      }
      .status { position: fixed; top: 16px; right: 20px; font-size: 14px; color: #999; }
      .status.online { color: #00ff88; }
      .plate {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-weight: 700; font-size: 48px; letter-spacing: 0.1em; color: #f5a623;
      }
      .title { font-size: 28px; font-weight: 600; }
      .fee { font-size: 64px; font-weight: 700; }
      .muted { color: #999; font-size: 18px; }
    </style>
  </head>
  <body>
    <div class="status" id="status">•</div>
    <div class="title" id="title">Menunggu kendaraan…</div>
    <div class="plate" id="plate"></div>
    <div class="fee" id="fee"></div>
    <div class="muted" id="note"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const rupiah = (n) => "Rp " + Number(n || 0).toLocaleString("id-ID");

      function show({ title, plate = "", fee = "", note = "" }) {
        $("title").textContent = title;
        $("plate").textContent = plate;
        $("fee").textContent = fee;
        $("note").textContent = note;
      }

      const es = new EventSource("/events");
      es.onopen = () => { $("status").classList.add("online"); $("status").textContent = "● online"; };
      es.onerror = () => { $("status").classList.remove("online"); $("status").textContent = "○ offline"; };

      es.addEventListener("entry", (e) => {
        const d = JSON.parse(e.data);
        show({ title: d.is_member ? "Selamat datang, Member" : "Selamat datang", note: "Portal terbuka" });
      });
      es.addEventListener("exit", (e) => {
        const d = JSON.parse(e.data);
        show({
          title: d.is_member ? "Member — Gratis" : "Total Bayar",
          plate: d.plate,
          fee: d.fee > 0 ? rupiah(d.fee) : "",
          note: d.payment_status === "paid" ? "Lunas — terima kasih" : "Menunggu pembayaran",
        });
      });
      es.addEventListener("entry_offline", (e) => {
        const d = JSON.parse(e.data);
        show({ title: "Masuk (offline)", plate: d.plate, note: "Tersimpan, akan disinkronkan" });
      });
      es.addEventListener("exit_offline", (e) => {
        const d = JSON.parse(e.data);
        show({ title: "Keluar (offline)", plate: d.plate, note: "Tersimpan, akan disinkronkan" });
      });
    </script>
  </body>
</html>
